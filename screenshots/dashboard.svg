<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg1)"/>

  <!-- Sidebar -->
  <rect width="240" height="800" fill="#1e293b"/>
  <rect x="0" y="0" width="240" height="60" fill="#334155"/>

  <!-- Logo -->
  <circle cx="40" cy="30" r="16" fill="url(#accent)"/>
  <text x="65" y="36" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">DeciFlow</text>

  <!-- Menu Items -->
  <g transform="translate(20, 80)">
    <rect width="200" height="40" rx="8" fill="#6366f1" opacity="0.2"/>
    <rect x="12" y="12" width="16" height="16" rx="4" fill="#6366f1"/>
    <text x="40" y="25" font-family="sans-serif" font-size="14" fill="#fff">仪表盘</text>
  </g>

  <g transform="translate(20, 130)">
    <rect x="12" y="12" width="16" height="16" rx="4" fill="#64748b"/>
    <text x="40" y="25" font-family="sans-serif" font-size="14" fill="#94a3b8">分析</text>
  </g>

  <g transform="translate(20, 180)">
    <rect x="12" y="12" width="16" height="16" rx="4" fill="#64748b"/>
    <text x="40" y="25" font-family="sans-serif" font-size="14" fill="#94a3b8">图表</text>
  </g>

  <g transform="translate(20, 230)">
    <rect x="12" y="12" width="16" height="16" rx="4" fill="#64748b"/>
    <text x="40" y="25" font-family="sans-serif" font-size="14" fill="#94a3b8">数据源</text>
  </g>

  <g transform="translate(20, 280)">
    <rect x="12" y="12" width="16" height="16" rx="4" fill="#64748b"/>
    <text x="40" y="25" font-family="sans-serif" font-size="14" fill="#94a3b8">数据字典</text>
  </g>

  <!-- Main Content -->
  <g transform="translate(260, 20)">
    <!-- Header -->
    <rect width="1000" height="60" rx="8" fill="#1e293b"/>
    <text x="20" y="36" font-family="sans-serif" font-size="14" fill="#94a3b8">询问任何关于数据的问题...</text>
    <rect x="850" y="15" width="60" height="30" rx="6" fill="url(#accent)"/>
    <text x="870" y="35" font-family="sans-serif" font-size="12" fill="#fff">查询</text>

    <!-- Stats Cards -->
    <g transform="translate(0, 80)">
      <rect width="240" height="120" rx="12" fill="#1e293b"/>
      <text x="20" y="30" font-family="sans-serif" font-size="14" fill="#94a3b8">总用户数</text>
      <text x="20" y="65" font-family="sans-serif" font-size="32" font-weight="bold" fill="#fff">128,456</text>
      <text x="20" y="95" font-family="sans-serif" font-size="12" fill="#22c55e">↑ 12.5%</text>
    </g>

    <g transform="translate(260, 80)">
      <rect width="240" height="120" rx="12" fill="#1e293b"/>
      <text x="20" y="30" font-family="sans-serif" font-size="14" fill="#94a3b8">活跃用户</text>
      <text x="20" y="65" font-family="sans-serif" font-size="32" font-weight="bold" fill="#fff">45,231</text>
      <text x="20" y="95" font-family="sans-serif" font-size="12" fill="#22c55e">↑ 8.3%</text>
    </g>

    <g transform="translate(520, 80)">
      <rect width="240" height="120" rx="12" fill="#1e293b"/>
      <text x="20" y="30" font-family="sans-serif" font-size="14" fill="#94a3b8">转化率</text>
      <text x="20" y="65" font-family="sans-serif" font-size="32" font-weight="bold" fill="#fff">3.24%</text>
      <text x="20" y="95" font-family="sans-serif" font-size="12" fill="#ef4444">↓ 1.2%</text>
    </g>

    <g transform="translate(760, 80)">
      <rect width="240" height="120" rx="12" fill="#1e293b"/>
      <text x="20" y="30" font-family="sans-serif" font-size="14" fill="#94a3b8">总收入</text>
      <text x="20" y="65" font-family="sans-serif" font-size="32" font-weight="bold" fill="#fff">$89,234</text>
      <text x="20" y="95" font-family="sans-serif" font-size="12" fill="#22c55e">↑ 23.1%</text>
    </g>

    <!-- Chart Area -->
    <rect y="220" width="1000" height="400" rx="12" fill="#1e293b"/>
    <text x="20" y="250" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">用户增长趋势</text>

    <!-- Simple Line Chart -->
    <polyline points="50,550 150,530 250,500 350,520 450,480 550,460 650,470 750,430 850,420 950,380"
              fill="none" stroke="url(#accent)" stroke-width="3"/>

    <!-- Data Points -->
    <circle cx="50" cy="550" r="5" fill="#6366f1"/>
    <circle cx="150" cy="530" r="5" fill="#6366f1"/>
    <circle cx="250" cy="500" r="5" fill="#6366f1"/>
    <circle cx="350" cy="520" r="5" fill="#6366f1"/>
    <circle cx="450" cy="480" r="5" fill="#6366f1"/>
    <circle cx="550" cy="460" r="5" fill="#6366f1"/>
    <circle cx="650" cy="470" r="5" fill="#6366f1"/>
    <circle cx="750" cy="430" r="5" fill="#6366f1"/>
    <circle cx="850" cy="420" r="5" fill="#6366f1"/>
    <circle cx="950" cy="380" r="5" fill="#6366f1"/>
  </g>

  <!-- AI Badge -->
  <g transform="translate(1130, 30)">
    <rect width="100" height="24" rx="12" fill="#6366f1"/>
    <text x="50" y="17" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle">AI 增强模式</text>
  </g>
</svg>
