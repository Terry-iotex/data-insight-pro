<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg-gradient)"/>

  <!-- Logo Content -->
  <g transform="translate(128, 128)">
    <!-- Top left - solid square -->
    <rect x="10" y="10" width="80" height="80" rx="20" fill="#ffffff"/>

    <!-- Top right - outline square -->
    <rect x="110" y="10" width="80" height="80" rx="20" stroke="#ffffff" stroke-width="12" fill="none"/>

    <!-- Bottom left - outline square -->
    <rect x="10" y="110" width="80" height="80" rx="20" stroke="#ffffff" stroke-width="12" fill="none"/>

    <!-- Bottom right - solid square -->
    <rect x="110" y="110" width="80" height="80" rx="20" fill="#ffffff"/>

    <!-- Flow connection lines -->
    <path d="M90 50L110 50M90 150L110 150M50 90L50 110M150 90L150 110"
          stroke="#ffffff"
          stroke-width="12"
          stroke-linecap="round"
          stroke-dasharray="12 12"
          opacity="0.8"/>
  </g>
</svg>
