<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background - Solid Indigo -->
  <rect width="512" height="512" rx="115" fill="#6366F1"/>

  <!-- Centered Data/Chart Icon -->
  <g transform="translate(156, 156)">
    <!-- Bar Chart Icon -->
    <!-- Bar 1 -->
    <rect x="20" y="80" width="40" height="100" rx="8" fill="#ffffff" opacity="0.9"/>

    <!-- Bar 2 -->
    <rect x="80" y="40" width="40" height="140" rx="8" fill="#ffffff" opacity="0.95"/>

    <!-- Bar 3 -->
    <rect x="140" y="60" width="40" height="120" rx="8" fill="#ffffff"/>

    <!-- Trend Line -->
    <path d="M10 110 Q90 30 170 70"
          stroke="#06B6D4"
          stroke-width="8"
          stroke-linecap="round"
          fill="none"/>

    <!-- Data Point on Trend -->
    <circle cx="40" cy="100" r="8" fill="#06B6D4"/>
    <circle cx="90" cy="55" r="8" fill="#06B6D4"/>
    <circle cx="140" cy="70" r="8" fill="#06B6D4"/>
  </g>
</svg>
